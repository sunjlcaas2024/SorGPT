<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SorGPT - 高粱科研问答系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 900px;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 2em; margin-bottom: 10px; }
        .header p { color: #a0a0a0; font-size: 0.9em; }
        .content { padding: 30px; }
        .api-section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .api-section h3 { margin-bottom: 15px; color: #333; }
        .input-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .input-group input {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        .input-group input:focus { border-color: #667eea; }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .chat-area {
            background: #f8f9fa;
            border-radius: 12px;
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 20px;
        }
        .message { margin-bottom: 15px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user-message {
            background: #667eea;
            color: white;
            padding: 12px 16px;
            border-radius: 12px 12px 4px 12px;
            max-width: 80%;
            margin-left: auto;
        }
        .bot-message {
            background: white;
            border: 1px solid #e0e0e0;
            padding: 16px;
            border-radius: 12px 12px 12px 4px;
            max-width: 85%;
        }
        .query-type { font-size: 12px; color: #667eea; margin-bottom: 8px; font-weight: 600; }
        .answer { line-height: 1.6; color: #333; white-space: pre-wrap; }
        .references {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
            font-size: 13px;
            color: #666;
        }
        .references h4 { margin-bottom: 10px; color: #333; }
        .ref-item { background: #f8f9fa; padding: 10px; border-radius: 6px; margin-bottom: 8px; font-size: 12px; white-space: pre-wrap; }
        .question-input { display: flex; gap: 10px; }
        .question-input textarea {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            resize: none;
            height: 60px;
            font-size: 14px;
            outline: none;
            font-family: inherit;
        }
        .question-input textarea:focus { border-color: #667eea; }
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background: #f8f9fa;
            font-size: 12px;
            color: #666;
        }
        .typing { color: #667eea; font-style: italic; }
        .error-msg { color: #dc3545; background: #f8d7da; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SorGPT</h1>
            <p>高粱科研文献智能问答系统</p>
        </div>
        <div class="content">
            <div class="api-section">
                <h3>API 认证</h3>
                <div class="input-group">
                    <input type="text" id="apiKey" placeholder="输入 API Key..." />
                    <button class="btn btn-primary" onclick="loadApiKey()">加载</button>
                    <button class="btn btn-secondary" onclick="registerUser()">注册新用户</button>
                </div>
            </div>
            <div class="chat-area" id="chatArea">
                <div style="text-align: center; color: #999; margin-top: 150px;">
                    <p>欢迎使用 SorGPT</p>
                    <p style="font-size: 14px; margin-top: 10px;">请先输入 API Key 开始对话</p>
                </div>
            </div>
            <div class="question-input">
                <textarea id="question" placeholder="输入您的科研问题 (Enter发送)" onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendQuestion();}"></textarea>
                <button class="btn btn-primary" onclick="sendQuestion()" id="sendBtn">发送</button>
            </div>
        </div>
        <div class="status-bar">
            <span id="status">状态: 未连接</span>
            <span id="queryCount">查询次数: 0</span>
        </div>
    </div>
    <script>
        let apiKey = "";
        let queryCount = 0;
        const API = location.origin;

        function loadApiKey() {
            const v = document.getElementById("apiKey").value.trim();
            if (v) {
                apiKey = v;
                document.getElementById("chatArea").innerHTML = '<div style="text-align:center;color:#667eea;margin-top:180px;">已连接，准备就绪</div>';
                document.getElementById("status").textContent = "状态: 已连接";
            }
        }

        async function registerUser() {
            try {
                const resp = await fetch(API + "/register?username=user" + Date.now());
                const data = await resp.json();
                document.getElementById("apiKey").value = data.api_key;
                apiKey = data.api_key;
                alert("注册成功!\nAPI Key: " + data.api_key + "\n请妥善保存!");
                loadApiKey();
            } catch (e) { alert("注册失败: " + e.message); }
        }

        function escapeHtml(t) {
            const d = document.createElement("div");
            d.textContent = t;
            return d.innerHTML;
        }

        function addMsg(role, content, qtype, refs) {
            const area = document.getElementById("chatArea");
            const div = document.createElement("div");
            div.className = "message";
            if (role === "user") {
                div.innerHTML = '<div class="user-message">' + escapeHtml(content) + '</div>';
            } else {
                let refsHtml = "";
                if (refs && refs.length > 0) {
                    refsHtml = '<div class="references"><h4>参考文献</h4>' + refs.map(r => '<div class="ref-item">' + escapeHtml(r) + '</div>').join("") + '</div>';
                }
                div.innerHTML = '<div class="bot-message">' + (qtype ? '<div class="query-type">问题类型: ' + qtype + '</div>' : '') + '<div class="answer">' + content.replace(/\n/g, "<br>") + '</div>' + refsHtml + '</div>';
            }
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }

        async function sendQuestion() {
            const q = document.getElementById("question").value.trim();
            if (!q) return;
            if (!apiKey) { alert("请先输入 API Key"); return; }

            const btn = document.getElementById("sendBtn");
            btn.disabled = true;
            btn.textContent = "思考中...";
            addMsg("user", q);
            document.getElementById("question").value = "";

            const typing = document.createElement("div");
            typing.innerHTML = '<div class="bot-message"><span class="typing">正在检索文献并生成答案...</span></div>';
            document.getElementById("chatArea").appendChild(typing);

            try {
                const resp = await fetch(API + "/ask/stream", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "X-API-Key": apiKey },
                    body: JSON.stringify({ question: q })
                });
                typing.remove();
                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.detail || "请求失败");
                }
                // Streaming read: show thinking + answer as they arrive
                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let fullText = "";
                let queryType = "";
                let references = [];
                let thinkingDiv = null;
                let answerDiv = null;
                let isAnswerPhase = false;
                let buffer = "";
                
                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, {stream: true});
                    // Process lines
                    const lines = buffer.split("
");
                    buffer = lines.pop() || "";
                    for (const line of lines) {
                        if (line.startsWith("---METADATA---")) {
                            try {
                                const meta = JSON.parse(buffer);
                                queryType = meta.query_type || "";
                                references = meta.references || [];
                            } catch(e) {}
                            break;
                        }
                        if (line.includes("思考过程结束")) {
                            isAnswerPhase = true;
                            if (thinkingDiv) thinkingDiv.innerHTML += "<hr><em>思考结束，生成答案...</em>";
                            continue;
                        }
                        if (!isAnswerPhase) {
                            if (!thinkingDiv) {
                                thinkingDiv = document.createElement("div");
                                thinkingDiv.className = "bot-message thinking";
                                thinkingDiv.innerHTML = "<details open><summary>深度思考中...</summary><pre style='white-space:pre-wrap;font-size:12px;color:#666'>";
                                document.getElementById("chatArea").appendChild(thinkingDiv);
                            }
                            const pre = thinkingDiv.querySelector("pre");
                            if (pre) pre.textContent += line;
                        } else {
                            if (!answerDiv) {
                                answerDiv = document.createElement("div");
                                answerDiv.className = "bot-message";
                                document.getElementById("chatArea").appendChild(answerDiv);
                            }
                            answerDiv.innerHTML += line.replace(/
/g, "<br>");
                        }
                    }
                }
                // Final format
                const finalHtml = formatAnswer(fullText || answerDiv?.innerHTML || "", queryType, references);
                if (answerDiv) answerDiv.innerHTML = finalHtml;
                queryCount++;
                document.getElementById("queryCount").textContent = "查询次数: " + queryCount;
            } catch (e) {
                typing.remove();
                addMsg("bot", '<span class="error-msg">错误: ' + e.message + '</span>');
            }
            btn.disabled = false;
            btn.textContent = "发送";
        }

        function formatAnswer(text, queryType, refs) {
            let html = text.replace(/
/g, "<br>");
            html = html.replace(/\[([\d,\s]+)\]/g, '<sup>[$1]</sup>');
            if (queryType) html = "<small>[" + queryType + "]</small><br>" + html;
            if (refs && refs.length > 0) {
                html += "<br><br><details><summary>参考文献 (" + refs.length + ")</summary><ol>";
                refs.forEach(r => { html += "<li style='font-size:12px'>" + r.replace(/^\[\d+\]\s*/, "") + "</li>"; });
                html += "</ol></details>";
            }
            return html;
        }

        fetch("/").then(() => { document.getElementById("status").textContent = "状态: 服务正常"; })
            .catch(() => { document.getElementById("status").textContent = "状态: 服务离线"; });
    </script>
</body>
</html>
